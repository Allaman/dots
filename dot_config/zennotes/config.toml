# ZenNotes configuration
# Docs: https://github.com/ZenNotes/zennotes
#
# Holds your portable preferences (theme, editor, vim, keymaps, …) so you can
# sync them across machines with git, stow, chezmoi, and friends. Managed by
# ZenNotes but safe to hand-edit — changes apply live, no restart needed.
#
# Every available option is listed below with its current value; the inline
# comment shows the allowed values. Edit a value to customize it — ZenNotes
# keeps this list complete, so a removed option reappears with its default.
# Note: comments you add yourself may be dropped when the app rewrites the file.

config_version = 1

[vim]
enabled = true  # true | false — CodeMirror Vim bindings
insert_escape = ""  # key sequence to leave insert mode, e.g. "jk"; empty disables
yank_to_clipboard = true  # also copy Vim yank/delete/change to the system clipboard
which_key_hints = true  # show the leader-key hint overlay (Vim only)
which_key_hint_mode = "sticky"  # timed | sticky
which_key_hint_timeout_ms = 900  # how long timed hints stay visible (ms)

[search]
backend = "auto"  # auto | builtin | ripgrep | fzf
ripgrep_path = ""  # absolute path to ripgrep; empty = look on $PATH
fzf_path = "/Users/michael/.fzf/bin/fzf"  # absolute path to fzf; empty = look on $PATH

[editor]
live_preview = true  # hide markdown syntax on inactive lines
render_tables = true  # render tables as widgets in live preview; off keeps them as plain text
markdown_snippets = true  # auto-close markdown delimiters while typing
hide_builtin_templates = false  # hide the shipped templates from the pickers
tabs_enabled = true  # enable tab-based editing
wrap_tabs = false  # wrap the tab strip instead of scrolling it
font_size = 16  # editor + preview font size (px)
line_height = 1.7  # line-height multiplier
preview_max_width = 920  # max reading width for the preview (px)
editor_max_width = 920  # max width of the editor column (px)
line_number_mode = "off"  # off | absolute | relative
line_number_position = "text"  # text | edge
word_wrap = true  # wrap long lines vs. scroll horizontally
preview_smooth_scroll = true  # animate half-page scroll in the preview
pdf_embed_in_edit_mode = "compact"  # compact | full

[appearance]
theme_family = "tokyo-night"  # apple | gruvbox | catppuccin | github | solarized | one | nord | tokyo-night | kanagawa | black-metal
theme_mode = "dark"  # light | dark | auto
theme_id = "tokyo-night-storm"  # resolved theme id; normally set automatically from family + mode
dark_sidebar = true  # tint the sidebar darker than the canvas
show_sidebar_chevrons = true  # show disclosure arrows in the sidebar
content_align = "center"  # center | left
unified_sidebar = true  # merge the note list into the sidebar tree

[typography]
interface_font = "MonoLisaText"  # app chrome font; empty = system default
text_font = "MonoLisaText"  # editor + preview font; empty = system default
mono_font = "MonoLisaCode"  # code / monospace font; empty = system default

[view]
note_sort_order = "none"  # none | manual | updated-desc | updated-asc | created-desc | created-asc | name-asc | name-desc
group_by_kind = true  # group notes by kind in the list
auto_reveal = false  # auto-expand the sidebar to the active note
quick_note_date_title = false  # title quick notes by date instead of a timestamp
quick_note_title_prefix = "Quick Note"  # prefix for new quick-note titles; empty = bare timestamp
auto_calendar_panel = true  # auto-show the calendar for daily / weekly notes
calendar_week_start = "monday"  # monday | sunday | locale
calendar_show_week_numbers = true  # show ISO week numbers in the calendar
tasks_view_mode = "list"  # list | calendar | kanban
kanban_group_by = "status"  # status | priority | folder

# Keymap overrides. Add or uncomment "<action.id>" = "<binding>" lines.
# Binding syntax: "Mod+P" = Cmd/Ctrl+P, "Shift+Mod+K", "Ctrl+W", "Space",
# or a two-key sequence like "g g". Uncomment a reference line to remap it.
[keymaps]
"global.focusPaneLeft" = "Ctrl+H"
"global.focusPaneDown" = "Ctrl+J"
"global.focusPaneUp" = "Ctrl+K"
"global.focusPaneRight" = "Ctrl+L"

